name: Build Windows portable

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-portable.yml"
      - "apps/desktop/**"
      - "packages/**"
      - "crates/**"
      - "scripts/build-portable.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Cargo.toml"

jobs:
  build-windows-portable:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable Windows app
        run: pnpm build:windows

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: namera-portable-windows
          path: |
            dist-portable/win32/Namera/**
            dist-portable/win32/Namera-portable-win64.zip
          if-no-files-found: error
